<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .caption { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .nodeTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .nodeText { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }

      .frame { fill: #f8fafc; stroke: #1e293b; stroke-width: 2; rx: 18; }
      .step1 { fill: #ecfeff; stroke: #0e7490; stroke-width: 2.5; rx: 14; }
      .step2 { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2.5; rx: 14; }
      .step3 { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.5; rx: 14; }
      .step4 { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; rx: 14; }
      .step5 { fill: #ecfdf5; stroke: #15803d; stroke-width: 2.5; rx: 14; }
      .step6 { fill: #faf5ff; stroke: #7e22ce; stroke-width: 2.5; rx: 14; }
      .step7 { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2.5; rx: 14; }

      .decision { fill: #ffffff; stroke: #475569; stroke-width: 2.5; }
      .arrow { stroke: #0f172a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .softArrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrowSoft); }
      .dashArrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrowSoft); stroke-dasharray: 8 8; }
      .chip { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 10; }
      .chipText { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#0f172a" />
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#475569" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1250" fill="#ffffff"/>
  <text x="900" y="68" text-anchor="middle" class="title">Flowchart of the Clinical Decision Workflow</text>
  <text x="900" y="104" text-anchor="middle" class="subtitle">Seven Steps</text>

  <rect class="frame" x="70" y="140" width="1660" height="1040"/>
  <text x="100" y="180" class="caption">Fig 5.2. Clinical Decision Workflow</text>

  <!-- Step 1 -->
  <rect class="step1" x="160" y="240" width="600" height="110"/>
  <text x="460" y="282" text-anchor="middle" class="nodeTitle">Step 1: Patient Data Capture</text>
  <text x="460" y="312" text-anchor="middle" class="nodeText">Collect demographics, symptoms, and vital inputs from Android forms</text>

  <!-- Step 2 -->
  <rect class="step2" x="1020" y="240" width="600" height="110"/>
  <text x="1320" y="282" text-anchor="middle" class="nodeTitle">Step 2: Data Validation and Normalization</text>
  <text x="1320" y="312" text-anchor="middle" class="nodeText">Check completeness, cast numeric values, and standardize input schema</text>

  <!-- Step 3 -->
  <rect class="step3" x="1020" y="420" width="600" height="110"/>
  <text x="1320" y="462" text-anchor="middle" class="nodeTitle">Step 3: Disease Pathway Selection</text>
  <text x="1320" y="492" text-anchor="middle" class="nodeText">Route to diabetes or heart-specific preprocessing and feature alignment</text>

  <!-- Step 4 -->
  <rect class="step4" x="160" y="420" width="600" height="110"/>
  <text x="460" y="462" text-anchor="middle" class="nodeTitle">Step 4: Risk Inference Execution</text>
  <text x="460" y="492" text-anchor="middle" class="nodeText">Run ML model to compute probability and preliminary risk category</text>

  <!-- Step 5 -->
  <rect class="step5" x="160" y="600" width="600" height="110"/>
  <text x="460" y="642" text-anchor="middle" class="nodeTitle">Step 5: Explainability and Rule Review</text>
  <text x="460" y="672" text-anchor="middle" class="nodeText">Extract SHAP top factors and apply clinical threshold overrides</text>

  <!-- Decision -->
  <polygon class="decision" points="1320,625 1450,560 1580,625 1450,690"/>
  <text x="1450" y="618" text-anchor="middle" class="nodeTitle">Critical Risk?</text>
  <text x="1450" y="645" text-anchor="middle" class="small">High-priority alert gate</text>

  <!-- Step 6 -->
  <rect class="step6" x="1020" y="760" width="600" height="110"/>
  <text x="1320" y="802" text-anchor="middle" class="nodeTitle">Step 6: Clinical Recommendation Synthesis</text>
  <text x="1320" y="832" text-anchor="middle" class="nodeText">Generate concise guidance and cautionary advice from risk + factors</text>

  <!-- Step 7 -->
  <rect class="step7" x="520" y="930" width="760" height="130"/>
  <text x="900" y="978" text-anchor="middle" class="nodeTitle">Step 7: Decision Delivery and Follow-Up Action</text>
  <text x="900" y="1008" text-anchor="middle" class="nodeText">Return risk report to dashboard, highlight next steps, and monitor changes over time</text>

  <!-- Optional high-risk escalation note -->
  <rect class="step4" x="160" y="760" width="600" height="110" opacity="0.95"/>
  <text x="460" y="802" text-anchor="middle" class="nodeTitle">Escalation Path</text>
  <text x="460" y="832" text-anchor="middle" class="nodeText">If critical: prioritize urgent consultation and immediate clinical review</text>

  <!-- Flow arrows -->
  <line class="arrow" x1="760" y1="295" x2="1020" y2="295"/>
  <line class="arrow" x1="1320" y1="350" x2="1320" y2="420"/>
  <line class="arrow" x1="1020" y1="475" x2="760" y2="475"/>
  <line class="arrow" x1="460" y1="530" x2="460" y2="600"/>
  <line class="arrow" x1="760" y1="655" x2="1320" y2="655"/>

  <line class="arrow" x1="1450" y1="690" x2="1320" y2="760"/>
  <text x="1390" y="732" class="small">No</text>

  <line class="dashArrow" x1="1450" y1="690" x2="460" y2="760"/>
  <text x="940" y="748" class="small">Yes - trigger escalation guidance</text>

  <line class="softArrow" x1="1320" y1="870" x2="980" y2="930"/>
  <line class="softArrow" x1="460" y1="870" x2="820" y2="930"/>

  <!-- Step chips -->
  <rect class="chip" x="180" y="252" width="34" height="26"/>
  <text x="197" y="270" text-anchor="middle" class="chipText">1</text>

  <rect class="chip" x="1040" y="252" width="34" height="26"/>
  <text x="1057" y="270" text-anchor="middle" class="chipText">2</text>

  <rect class="chip" x="1040" y="432" width="34" height="26"/>
  <text x="1057" y="450" text-anchor="middle" class="chipText">3</text>

  <rect class="chip" x="180" y="432" width="34" height="26"/>
  <text x="197" y="450" text-anchor="middle" class="chipText">4</text>

  <rect class="chip" x="180" y="612" width="34" height="26"/>
  <text x="197" y="630" text-anchor="middle" class="chipText">5</text>

  <rect class="chip" x="1040" y="772" width="34" height="26"/>
  <text x="1057" y="790" text-anchor="middle" class="chipText">6</text>

  <rect class="chip" x="540" y="942" width="34" height="26"/>
  <text x="557" y="960" text-anchor="middle" class="chipText">7</text>

  <text x="100" y="1125" class="small">Workflow supports both predictive decision support and high-risk escalation handling.</text>
</svg>
