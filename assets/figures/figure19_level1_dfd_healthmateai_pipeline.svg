<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1300" viewBox="0 0 2000 1300">
  <defs>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .frame { fill: #ffffff; stroke: #1e293b; stroke-width: 2; rx: 14; }
      .external { fill: #eef2ff; stroke: #3730a3; stroke-width: 2.2; rx: 12; }
      .process { fill: #ecfeff; stroke: #0e7490; stroke-width: 2.4; rx: 14; }
      .store { fill: #ecfdf5; stroke: #166534; stroke-width: 2.2; rx: 12; }
      .arrow { stroke: #0f172a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #475569; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowSoft); }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .flow { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .caption { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0,12 4.5,0 9" fill="#0f172a" />
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0,12 4.5,0 9" fill="#475569" />
    </marker>
  </defs>

  <rect width="2000" height="1300" fill="#ffffff"/>
  <text x="1000" y="64" text-anchor="middle" class="title">Level 1 Data Flow Diagram</text>
  <text x="1000" y="98" text-anchor="middle" class="subtitle">HealthMateAI Enhanced Clinical Pipeline</text>

  <rect class="frame" x="60" y="130" width="1880" height="1080"/>

  <!-- External entities -->
  <rect class="external" x="100" y="260" width="280" height="100"/>
  <text x="240" y="300" text-anchor="middle" class="label">Patient / User</text>
  <text x="240" y="324" text-anchor="middle" class="text">Input symptoms and vitals</text>

  <rect class="external" x="100" y="430" width="280" height="100"/>
  <text x="240" y="470" text-anchor="middle" class="label">Clinician</text>
  <text x="240" y="494" text-anchor="middle" class="text">Reviews output and action plan</text>

  <rect class="external" x="1660" y="260" width="280" height="110"/>
  <text x="1800" y="305" text-anchor="middle" class="label">Firebase Auth</text>
  <text x="1800" y="330" text-anchor="middle" class="text">Session identity service</text>

  <rect class="external" x="1660" y="430" width="280" height="110"/>
  <text x="1800" y="475" text-anchor="middle" class="label">Generative Advice API</text>
  <text x="1800" y="500" text-anchor="middle" class="text">Clinical narrative synthesis</text>

  <!-- Processes row 1 -->
  <rect class="process" x="470" y="240" width="300" height="110"/>
  <text x="620" y="282" text-anchor="middle" class="label">1.0 UI Intake</text>
  <text x="620" y="306" text-anchor="middle" class="text">Capture and package request</text>

  <rect class="process" x="840" y="240" width="300" height="110"/>
  <text x="990" y="282" text-anchor="middle" class="label">2.0 Auth and Routing</text>
  <text x="990" y="306" text-anchor="middle" class="text">Validate session and route disease</text>

  <rect class="process" x="1210" y="240" width="300" height="110"/>
  <text x="1360" y="282" text-anchor="middle" class="label">3.0 Input Preprocessing</text>
  <text x="1360" y="306" text-anchor="middle" class="text">Normalize and engineer features</text>

  <!-- Processes row 2 -->
  <rect class="process" x="470" y="460" width="300" height="110"/>
  <text x="620" y="502" text-anchor="middle" class="label">4.0 Model Inference</text>
  <text x="620" y="526" text-anchor="middle" class="text">Predict probability and risk class</text>

  <rect class="process" x="840" y="460" width="300" height="110"/>
  <text x="990" y="502" text-anchor="middle" class="label">5.0 Explainability</text>
  <text x="990" y="526" text-anchor="middle" class="text">SHAP feature attribution</text>

  <rect class="process" x="1210" y="460" width="300" height="110"/>
  <text x="1360" y="502" text-anchor="middle" class="label">6.0 Advice Generation</text>
  <text x="1360" y="526" text-anchor="middle" class="text">Compose patient-safe guidance</text>

  <!-- Process row 3 -->
  <rect class="process" x="840" y="680" width="300" height="120"/>
  <text x="990" y="726" text-anchor="middle" class="label">7.0 Response Aggregation</text>
  <text x="990" y="751" text-anchor="middle" class="text">Risk + factors + advice payload</text>

  <!-- Data stores -->
  <rect class="store" x="430" y="900" width="290" height="120"/>
  <text x="575" y="947" text-anchor="middle" class="label">D1 Model Artifacts</text>
  <text x="575" y="972" text-anchor="middle" class="text">XGBoost, SVM, thresholds</text>

  <rect class="store" x="800" y="900" width="380" height="120"/>
  <text x="990" y="947" text-anchor="middle" class="label">D2 Feature Metadata</text>
  <text x="990" y="972" text-anchor="middle" class="text">Feature maps and defaults</text>

  <rect class="store" x="1260" y="900" width="330" height="120"/>
  <text x="1425" y="947" text-anchor="middle" class="label">D3 Audit and Logs</text>
  <text x="1425" y="972" text-anchor="middle" class="text">Inference trace and outcomes</text>

  <!-- Flows -->
  <line class="arrow" x1="380" y1="310" x2="470" y2="295"/>
  <text class="flow" x="425" y="284" text-anchor="middle">Patient inputs</text>

  <line class="arrow" x1="770" y1="295" x2="840" y2="295"/>
  <text class="flow" x="805" y="282" text-anchor="middle">Request</text>

  <line class="arrow" x1="1140" y1="295" x2="1210" y2="295"/>
  <text class="flow" x="1175" y="282" text-anchor="middle">Routed case</text>

  <line class="arrow" x1="1360" y1="350" x2="1360" y2="460"/>
  <text class="flow" x="1384" y="408">Prepared frame</text>

  <line class="arrow" x1="1210" y1="515" x2="1140" y2="515"/>
  <text class="flow" x="1175" y="500" text-anchor="middle">Explainer input</text>

  <line class="arrow" x1="840" y1="515" x2="770" y2="515"/>
  <text class="flow" x="805" y="500" text-anchor="middle">Model score</text>

  <line class="arrow" x1="620" y1="570" x2="620" y2="680"/>
  <line class="arrow" x1="990" y1="570" x2="990" y2="680"/>
  <line class="arrow" x1="1360" y1="570" x2="1140" y2="720"/>
  <text class="flow" x="1260" y="640" text-anchor="middle">Advice text</text>

  <line class="arrow" x1="1140" y1="740" x2="1660" y2="480"/>
  <text class="flow" x="1400" y="615" text-anchor="middle">Prompt/response exchange</text>

  <line class="dash" x1="990" y1="240" x2="1660" y2="315"/>
  <text class="flow" x="1320" y="260" text-anchor="middle">Session validation</text>

  <line class="arrow" x1="990" y1="800" x2="380" y2="480"/>
  <text class="flow" x="670" y="620" text-anchor="middle">Decision output</text>

  <line class="arrow" x1="990" y1="800" x2="240" y2="530"/>
  <text class="flow" x="610" y="700" text-anchor="middle">Clinical summary</text>

  <line class="dash" x1="620" y1="900" x2="620" y2="570"/>
  <line class="dash" x1="990" y1="900" x2="990" y2="570"/>
  <line class="dash" x1="1360" y1="570" x2="1425" y2="900"/>

  <text x="95" y="1245" class="caption">Fig 19. Level 1 Data Flow Diagram - HealthMateAI System</text>
</svg>
