    <text class="label" x="20" y="36">CKD - SVM</text><text class="small" x="440" y="36">Acc: 0.78</text>
    <text class="small" x="285" y="78">Predicted</text><text class="small" x="120" y="195" transform="rotate(-90 120 195)">Actual</text>
    <rect class="cellA" x="190" y="90" width="110" height="110"/><rect class="cellB" x="300" y="90" width="110" height="110"/><rect class="cellC" x="190" y="200" width="110" height="110"/><rect class="cellD" x="300" y="200" width="110" height="110"/>
    <text class="small" x="225" y="84">Neg</text><text class="small" x="335" y="84">Pos</text><text class="small" x="160" y="155">Neg</text><text class="small" x="160" y="265">Pos</text>
    <text class="num" x="245" y="155" text-anchor="middle">93</text><text class="num" x="355" y="155" text-anchor="middle">17</text><text class="num" x="245" y="265" text-anchor="middle">24</text><text class="num" x="355" y="265" text-anchor="middle">88</text>
  </g>

  <g transform="translate(760,920)">
    <rect class="panel" x="0" y="0" width="600" height="320"/>
    <text class="label" x="20" y="36">CKD - XGBoost</text><text class="small" x="440" y="36">Acc: 0.84</text>
    <text class="small" x="285" y="78">Predicted</text><text class="small" x="120" y="195" transform="rotate(-90 120 195)">Actual</text>
    <rect class="cellA" x="190" y="90" width="110" height="110"/><rect class="cellB" x="300" y="90" width="110" height="110"/><rect class="cellC" x="190" y="200" width="110" height="110"/><rect class="cellD" x="300" y="200" width="110" height="110"/>
    <text class="small" x="225" y="84">Neg</text><text class="small" x="335" y="84">Pos</text><text class="small" x="160" y="155">Neg</text><text class="small" x="160" y="265">Pos</text>
    <text class="num" x="245" y="155" text-anchor="middle">98</text><text class="num" x="355" y="155" text-anchor="middle">12</text><text class="num" x="245" y="265" text-anchor="middle">19</text><text class="num" x="355" y="265" text-anchor="middle">93</text>
