    <text class="num" x="245" y="155" text-anchor="middle">82</text><text class="num" x="355" y="155" text-anchor="middle">28</text><text class="num" x="245" y="265" text-anchor="middle">36</text><text class="num" x="355" y="265" text-anchor="middle">76</text>
