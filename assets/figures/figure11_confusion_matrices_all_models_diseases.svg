    <text class="small" x="225" y="84">Neg</text><text class="small" x="335" y="84">Pos</text><text class="small" x="160" y="155">Neg</text><text class="small" x="160" y="265">Pos</text>
    <text class="num" x="245" y="155" text-anchor="middle">83</text><text class="num" x="355" y="155" text-anchor="middle">27</text><text class="num" x="245" y="265" text-anchor="middle">35</text><text class="num" x="355" y="265" text-anchor="middle">77</text>
