    <text class="small" x="225" y="84">Neg</text><text class="small" x="335" y="84">Pos</text><text class="small" x="160" y="155">Neg</text><text class="small" x="160" y="265">Pos</text>
    <text class="num" x="245" y="155" text-anchor="middle">81</text><text class="num" x="355" y="155" text-anchor="middle">29</text><text class="num" x="245" y="265" text-anchor="middle">37</text><text class="num" x="355" y="265" text-anchor="middle">75</text>
  </g>

  <!-- Row 3: CKD -->
  <g transform="translate(110,920)">
