<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 23px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .axisLabel { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .feat { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .tick { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .value { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .frame { fill: #ffffff; stroke: #1e293b; stroke-width: 2; rx: 14; }
      .plot { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .grid { stroke: #d1d5db; stroke-width: 1.2; }
      .bar1 { fill: #b91c1c; }
      .bar2 { fill: #dc2626; }
      .bar3 { fill: #ef4444; }
      .bar4 { fill: #f87171; }
      .caption { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .note { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="#ffffff"/>
  <text x="900" y="68" text-anchor="middle" class="title">SHAP Global Feature Importance</text>
  <text x="900" y="102" text-anchor="middle" class="subtitle">Heart Disease (XGBoost)</text>

  <rect class="frame" x="70" y="140" width="1660" height="980"/>
  <rect class="plot" x="300" y="220" width="1200" height="780"/>

  <line class="grid" x1="300" y1="220" x2="300" y2="1000"/>
  <line class="grid" x1="500" y1="220" x2="500" y2="1000"/>
  <line class="grid" x1="700" y1="220" x2="700" y2="1000"/>
  <line class="grid" x1="900" y1="220" x2="900" y2="1000"/>
  <line class="grid" x1="1100" y1="220" x2="1100" y2="1000"/>
  <line class="grid" x1="1300" y1="220" x2="1300" y2="1000"/>
  <line class="grid" x1="1500" y1="220" x2="1500" y2="1000"/>

  <text class="feat" x="280" y="285" text-anchor="end">ejection_fraction</text>
  <rect class="bar1" x="300" y="260" width="960" height="36"/><text class="value" x="1270" y="284">0.144</text>

  <text class="feat" x="280" y="355" text-anchor="end">serum_creatinine</text>
  <rect class="bar1" x="300" y="330" width="847" height="36"/><text class="value" x="1157" y="354">0.127</text>

  <text class="feat" x="280" y="425" text-anchor="end">age</text>
  <rect class="bar2" x="300" y="400" width="727" height="36"/><text class="value" x="1037" y="424">0.109</text>

  <text class="feat" x="280" y="495" text-anchor="end">serum_sodium</text>
  <rect class="bar2" x="300" y="470" width="587" height="36"/><text class="value" x="897" y="494">0.088</text>

  <text class="feat" x="280" y="565" text-anchor="end">creatinine_phosphokinase</text>
  <rect class="bar2" x="300" y="540" width="480" height="36"/><text class="value" x="790" y="564">0.072</text>

  <text class="feat" x="280" y="635" text-anchor="end">platelets</text>
  <rect class="bar3" x="300" y="610" width="413" height="36"/><text class="value" x="723" y="634">0.062</text>

  <text class="feat" x="280" y="705" text-anchor="end">high_blood_pressure</text>
  <rect class="bar3" x="300" y="680" width="347" height="36"/><text class="value" x="657" y="704">0.052</text>

  <text class="feat" x="280" y="775" text-anchor="end">diabetes</text>
  <rect class="bar3" x="300" y="750" width="293" height="36"/><text class="value" x="603" y="774">0.044</text>

  <text class="feat" x="280" y="845" text-anchor="end">anaemia</text>
  <rect class="bar4" x="300" y="820" width="253" height="36"/><text class="value" x="563" y="844">0.038</text>

  <text class="feat" x="280" y="915" text-anchor="end">smoking</text>
  <rect class="bar4" x="300" y="890" width="207" height="36"/><text class="value" x="517" y="914">0.031</text>

  <text class="tick" x="300" y="1030" text-anchor="middle">0.00</text>
  <text class="tick" x="500" y="1030" text-anchor="middle">0.03</text>
  <text class="tick" x="700" y="1030" text-anchor="middle">0.06</text>
  <text class="tick" x="900" y="1030" text-anchor="middle">0.09</text>
  <text class="tick" x="1100" y="1030" text-anchor="middle">0.12</text>
  <text class="tick" x="1300" y="1030" text-anchor="middle">0.15</text>
  <text class="tick" x="1500" y="1030" text-anchor="middle">0.18</text>

  <text class="axisLabel" x="900" y="1080" text-anchor="middle">Mean |SHAP Value| (Impact on Model Output)</text>

  <text class="caption" x="90" y="1150">Fig 13. SHAP Feature Importance - Heart Disease</text>
  <text class="note" x="1710" y="1150" text-anchor="end">Higher bars indicate stronger global contribution to risk prediction.</text>
</svg>
