      .note { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .low { fill: #2563eb; }
      .mid { fill: #a855f7; }
      .high { fill: #ef4444; }
      .zero { stroke: #0f172a; stroke-width: 2; stroke-dasharray: 7 5; }
