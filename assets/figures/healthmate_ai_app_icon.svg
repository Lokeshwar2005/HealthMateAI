<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1224"/>
      <stop offset="50%" stop-color="#0E1A33"/>
      <stop offset="100%" stop-color="#060B18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#30D9D4"/>
      <stop offset="100%" stop-color="#59F0FF"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="196" fill="url(#bg)"/>
  <rect x="96" y="96" width="832" height="832" rx="176" fill="none" stroke="#102247" stroke-width="2"/>

  <!-- Outer halo -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="#1C3A6B" stroke-width="2"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#24477E" stroke-width="2"/>

  <!-- Brain outline -->
  <path d="M512 260
           C420 260 348 322 336 400
           C276 414 236 464 236 524
           C236 596 290 654 362 654
           C378 724 440 778 512 778
           C584 778 646 724 662 654
           C734 654 788 596 788 524
           C788 464 748 414 688 400
           C676 322 604 260 512 260 Z"
        fill="none" stroke="url(#glow)" stroke-width="10" filter="url(#softGlow)"/>

  <!-- Brain circuit lines -->
  <path d="M412 420 L512 470 L612 420" fill="none" stroke="#3DD6D0" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 520 L512 570 L612 520" fill="none" stroke="#3DD6D0" stroke-width="6" stroke-linecap="round"/>
  <path d="M462 360 L462 640" fill="none" stroke="#355DFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M562 360 L562 640" fill="none" stroke="#355DFF" stroke-width="4" stroke-linecap="round"/>

  <!-- ECG line -->
  <path d="M240 512 H380 L420 452 L460 592 L520 412 L580 612 L620 512 H784"
        fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

  <!-- Pulse nodes -->
  <circle cx="420" cy="452" r="8" fill="#59F0FF"/>
  <circle cx="460" cy="592" r="8" fill="#59F0FF"/>
  <circle cx="520" cy="412" r="8" fill="#59F0FF"/>
  <circle cx="580" cy="612" r="8" fill="#59F0FF"/>

  <!-- Inner glow core -->
  <circle cx="512" cy="512" r="90" fill="none" stroke="#59F0FF" stroke-opacity="0.5" stroke-width="6"/>
  <circle cx="512" cy="512" r="64" fill="#0C1A33" stroke="#30D9D4" stroke-opacity="0.6" stroke-width="4"/>
</svg>
