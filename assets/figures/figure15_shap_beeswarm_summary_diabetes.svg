  <text class="feat" x="310" y="535" text-anchor="end">Insulin</text>
  <text class="feat" x="310" y="615" text-anchor="end">BloodPressure</text>
  <text class="feat" x="310" y="695" text-anchor="end">DiabetesPedigreeFunction</text>
  <text class="feat" x="310" y="775" text-anchor="end">Pregnancies</text>
