  <circle class="low" cx="880" cy="607" r="5"/><circle class="mid" cx="970" cy="618" r="5"/><circle class="high" cx="1040" cy="610" r="5"/><circle class="high" cx="1110" cy="622" r="5"/><circle class="mid" cx="1000" cy="603" r="5"/><circle class="low" cx="920" cy="625" r="5"/><circle class="high" cx="1150" cy="614" r="5"/><circle class="mid" cx="980" cy="616" r="5"/><circle class="low" cx="860" cy="614" r="5"/><circle class="high" cx="1070" cy="608" r="5"/>

