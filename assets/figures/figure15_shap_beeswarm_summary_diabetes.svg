  <!-- x-axis ticks -->
  <text class="tick" x="330" y="1070" text-anchor="middle">-0.20</text>
  <text class="tick" x="492" y="1070" text-anchor="middle">-0.15</text>
  <text class="tick" x="655" y="1070" text-anchor="middle">-0.10</text>
  <text class="tick" x="817" y="1070" text-anchor="middle">-0.05</text>
  <text class="tick" x="980" y="1070" text-anchor="middle">0.00</text>
  <text class="tick" x="1142" y="1070" text-anchor="middle">0.05</text>
  <text class="tick" x="1305" y="1070" text-anchor="middle">0.10</text>
  <text class="tick" x="1467" y="1070" text-anchor="middle">0.15</text>
  <text class="tick" x="1630" y="1070" text-anchor="middle">0.20</text>

  <text class="axisLabel" x="980" y="1115" text-anchor="middle">SHAP Value (Impact on Prediction)</text>

  <!-- Color legend -->
  <circle class="low" cx="1420" cy="175" r="7"/><text class="tick" x="1440" y="180">Low Feature Value</text>
  <circle class="mid" cx="1590" cy="175" r="7"/><text class="tick" x="1610" y="180">Medium</text>
  <circle class="high" cx="1710" cy="175" r="7"/><text class="tick" x="1730" y="180">High Feature Value</text>

  <text class="caption" x="90" y="1180">Fig 15. SHAP Beeswarm Summary - Diabetes</text>
  <text class="note" x="1810" y="1180" text-anchor="end">Point spread reflects feature effect variability across patient instances.</text>
</svg>
