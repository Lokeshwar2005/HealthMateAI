<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1300" viewBox="0 0 2100 1300">
  <defs>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .frame { fill: #ffffff; stroke: #1e293b; stroke-width: 2; rx: 14; }
      .actor { fill: #eef2ff; stroke: #3730a3; stroke-width: 2.2; rx: 12; }
      .service { fill: #ecfeff; stroke: #0e7490; stroke-width: 2.2; rx: 12; }
      .ml { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.2; rx: 12; }
      .line { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; }
      .msg { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrowSoft); stroke-dasharray: 7 6; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .caption { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#0f172a"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#334155"/>
    </marker>
  </defs>

  <rect width="2100" height="1300" fill="#ffffff"/>
  <text x="1050" y="64" text-anchor="middle" class="title">Sequence Diagram - Disease Prediction Request Flow</text>
  <text x="1050" y="98" text-anchor="middle" class="subtitle">HealthMateAI End-to-End System Interaction</text>

  <rect class="frame" x="60" y="130" width="1980" height="1080"/>

  <!-- Participants -->
  <rect class="actor" x="120" y="170" width="220" height="70"/>
  <text x="230" y="213" text-anchor="middle" class="label">User</text>

  <rect class="service" x="430" y="170" width="250" height="70"/>
  <text x="555" y="213" text-anchor="middle" class="label">Android App</text>

  <rect class="service" x="780" y="170" width="250" height="70"/>
  <text x="905" y="213" text-anchor="middle" class="label">Flask API</text>

  <rect class="ml" x="1130" y="170" width="260" height="70"/>
  <text x="1260" y="213" text-anchor="middle" class="label">ML Engine</text>

  <rect class="service" x="1490" y="170" width="260" height="70"/>
  <text x="1620" y="213" text-anchor="middle" class="label">SHAP Explainer</text>

  <rect class="service" x="1830" y="170" width="180" height="70"/>
  <text x="1920" y="213" text-anchor="middle" class="label">LLM API</text>

  <!-- Lifelines -->
  <line class="line" x1="230" y1="240" x2="230" y2="1140"/>
  <line class="line" x1="555" y1="240" x2="555" y2="1140"/>
  <line class="line" x1="905" y1="240" x2="905" y2="1140"/>
  <line class="line" x1="1260" y1="240" x2="1260" y2="1140"/>
  <line class="line" x1="1620" y1="240" x2="1620" y2="1140"/>
  <line class="line" x1="1920" y1="240" x2="1920" y2="1140"/>

  <!-- Sequence messages -->
  <line class="msg" x1="230" y1="300" x2="555" y2="300"/>
  <text class="text" x="392" y="287" text-anchor="middle">1. Enter vitals and select disease</text>

  <line class="msg" x1="555" y1="360" x2="905" y2="360"/>
  <text class="text" x="730" y="347" text-anchor="middle">2. POST /predict (JSON payload)</text>

  <line class="msg" x1="905" y1="420" x2="1260" y2="420"/>
  <text class="text" x="1082" y="407" text-anchor="middle">3. preprocess + model.predict_proba()</text>

  <line class="ret" x1="1260" y1="480" x2="905" y2="480"/>
  <text class="text" x="1082" y="467" text-anchor="middle">4. probability + risk_level</text>

  <line class="msg" x1="905" y1="540" x2="1620" y2="540"/>
  <text class="text" x="1262" y="527" text-anchor="middle">5. compute SHAP top contributing features</text>

  <line class="ret" x1="1620" y1="600" x2="905" y2="600"/>
  <text class="text" x="1262" y="587" text-anchor="middle">6. ranked feature factors</text>

  <line class="msg" x1="905" y1="660" x2="1920" y2="660"/>
  <text class="text" x="1412" y="647" text-anchor="middle">7. prompt advice generation (risk + factors)</text>

  <line class="ret" x1="1920" y1="720" x2="905" y2="720"/>
  <text class="text" x="1412" y="707" text-anchor="middle">8. medical advice text</text>

  <line class="msg" x1="905" y1="800" x2="555" y2="800"/>
  <text class="text" x="730" y="787" text-anchor="middle">9. JSON response: risk, probability, factors, advice</text>

  <line class="ret" x1="555" y1="860" x2="230" y2="860"/>
  <text class="text" x="392" y="847" text-anchor="middle">10. Display dashboard result</text>

  <!-- Notes -->
  <rect class="box" x="840" y="910" width="390" height="130"/>
  <text class="label" x="860" y="945">Alternative path:</text>
  <text class="text" x="860" y="972">If disease type is invalid, Flask returns HTTP 400.</text>
  <text class="text" x="860" y="996">If LLM call fails, advice fallback text is returned.</text>

  <rect class="box" x="1290" y="910" width="520" height="130"/>
  <text class="label" x="1310" y="945">System guarantees:</text>
  <text class="text" x="1310" y="972">- deterministic risk computation from trained models</text>
  <text class="text" x="1310" y="996">- interpretable top factors via SHAP explanation</text>

  <text x="95" y="1245" class="caption">Fig 21. Sequence Diagram of the System</text>
</svg>
