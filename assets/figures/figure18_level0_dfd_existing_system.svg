<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1200" viewBox="0 0 1900 1200">
  <defs>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .frame { fill: #ffffff; stroke: #1e293b; stroke-width: 2; rx: 14; }
      .external { fill: #eef2ff; stroke: #3730a3; stroke-width: 2.2; rx: 12; }
      .process { fill: #ecfeff; stroke: #0e7490; stroke-width: 2.4; rx: 14; }
      .store { fill: #ecfdf5; stroke: #166534; stroke-width: 2.2; rx: 12; }
      .arrow { stroke: #0f172a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #475569; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowSoft); }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .flow { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .caption { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0,12 4.5,0 9" fill="#0f172a" />
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0,12 4.5,0 9" fill="#475569" />
    </marker>
  </defs>

  <rect width="1900" height="1200" fill="#ffffff"/>
  <text x="950" y="64" text-anchor="middle" class="title">Level 0 Data Flow Diagram</text>
  <text x="950" y="98" text-anchor="middle" class="subtitle">Context Diagram of Existing Clinical ML System</text>

  <rect class="frame" x="70" y="130" width="1760" height="1000"/>

  <!-- External entities -->
  <rect class="external" x="140" y="300" width="320" height="110"/>
  <text x="300" y="345" text-anchor="middle" class="label">Patient / User</text>
  <text x="300" y="372" text-anchor="middle" class="text">Symptoms and health inputs</text>

  <rect class="external" x="1400" y="270" width="330" height="120"/>
  <text x="1565" y="315" text-anchor="middle" class="label">Clinical Guidance API</text>
  <text x="1565" y="342" text-anchor="middle" class="text">External text advice service</text>

  <rect class="external" x="1400" y="480" width="330" height="120"/>
  <text x="1565" y="525" text-anchor="middle" class="label">Auth Service</text>
  <text x="1565" y="552" text-anchor="middle" class="text">Identity and session validation</text>

  <!-- Main process -->
  <rect class="process" x="650" y="300" width="600" height="260"/>
  <text x="950" y="360" text-anchor="middle" class="label">0. Existing Clinical ML System</text>
  <text x="950" y="390" text-anchor="middle" class="text">Input preprocessing and disease risk inference</text>
  <text x="950" y="418" text-anchor="middle" class="text">Rule-based risk adjustment and explanation</text>
  <text x="950" y="446" text-anchor="middle" class="text">Prediction response with factors and advice</text>

  <!-- Data stores -->
  <rect class="store" x="650" y="700" width="360" height="140"/>
  <text x="830" y="755" text-anchor="middle" class="label">D1 Model Repository</text>
  <text x="830" y="784" text-anchor="middle" class="text">Serialized model artifacts</text>
  <text x="830" y="810" text-anchor="middle" class="text">Features and thresholds</text>

  <rect class="store" x="1080" y="700" width="360" height="140"/>
  <text x="1260" y="755" text-anchor="middle" class="label">D2 Clinical Dataset Store</text>
  <text x="1260" y="784" text-anchor="middle" class="text">Historical training/evaluation data</text>
  <text x="1260" y="810" text-anchor="middle" class="text">Domain feature metadata</text>

  <!-- Flows -->
  <line class="arrow" x1="460" y1="355" x2="650" y2="355"/>
  <text class="flow" x="545" y="338" text-anchor="middle">Input payload</text>

  <line class="arrow" x1="650" y1="465" x2="460" y2="465"/>
  <text class="flow" x="555" y="448" text-anchor="middle">Risk result and advice</text>

  <line class="arrow" x1="1250" y1="340" x2="1400" y2="330"/>
  <text class="flow" x="1330" y="315" text-anchor="middle">Advice prompt</text>

  <line class="arrow" x1="1400" y1="360" x2="1250" y2="390"/>
  <text class="flow" x="1335" y="380" text-anchor="middle">Generated guidance</text>

  <line class="dash" x1="1250" y1="470" x2="1400" y2="540"/>
  <text class="flow" x="1330" y="500" text-anchor="middle">Session check</text>

  <line class="arrow" x1="830" y1="700" x2="830" y2="560"/>
  <text class="flow" x="855" y="630">Model load</text>

  <line class="dash" x1="1260" y1="700" x2="1090" y2="560"/>
  <text class="flow" x="1185" y="620" text-anchor="middle">Reference data</text>

  <text x="95" y="1165" class="caption">Fig 18. Level 0 Data Flow Diagram - Existing System</text>
</svg>
